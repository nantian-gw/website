<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" rx="16" fill="#0a0e17" stroke="#1e293b" stroke-width="1"/>

  <!-- K8s API Box -->
  <rect x="40" y="140" width="160" height="120" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="120" y="170" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Inter,sans-serif">Kubernetes API</text>
  <text x="120" y="195" text-anchor="middle" fill="#64748b" font-size="10" font-family="JetBrains Mono,monospace">Gateway</text>
  <text x="120" y="215" text-anchor="middle" fill="#64748b" font-size="10" font-family="JetBrains Mono,monospace">HTTPRoute</text>
  <text x="120" y="235" text-anchor="middle" fill="#64748b" font-size="10" font-family="JetBrains Mono,monospace">EndpointSlice</text>

  <!-- Watch arrow -->
  <line x1="200" y1="185" x2="280" y2="160" stroke="url(#grad)" stroke-width="2" filter="url(#glow)"/>
  <line x1="200" y1="225" x2="280" y2="250" stroke="url(#grad)" stroke-width="2" filter="url(#glow)"/>
  <text x="240" y="150" text-anchor="middle" fill="#06b6d4" font-size="10" font-family="Inter,sans-serif">watch</text>

  <!-- Control Plane Box -->
  <rect x="290" y="80" width="220" height="240" rx="8" fill="#111827" stroke="#06b6d4" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="108" text-anchor="middle" fill="#22d3ee" font-size="13" font-family="Inter,sans-serif" font-weight="600">Control Plane (Go)</text>
  <line x1="310" y1="120" x2="490" y2="120" stroke="#1e293b" stroke-width="1"/>
  <text x="400" y="148" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">Translator</text>
  <text x="400" y="172" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">xDS Server</text>
  <text x="400" y="196" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">Status Manager</text>
  <text x="400" y="220" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">Admin API</text>
  <text x="400" y="244" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">Leader Election</text>
  <text x="400" y="268" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">Node Status</text>

  <!-- xDS arrow -->
  <line x1="510" y1="175" x2="590" y2="150" stroke="url(#grad)" stroke-width="2" filter="url(#glow)"/>
  <line x1="510" y1="225" x2="590" y2="250" stroke="url(#grad)" stroke-width="2" filter="url(#glow)"/>
  <text x="550" y="140" text-anchor="middle" fill="#06b6d4" font-size="10" font-family="Inter,sans-serif">gRPC/xDS</text>

  <!-- Data Plane Box -->
  <rect x="600" y="110" width="180" height="180" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="690" y="138" text-anchor="middle" fill="#3b82f6" font-size="13" font-family="Inter,sans-serif" font-weight="600">Data Plane (Rust)</text>
  <line x1="620" y1="150" x2="760" y2="150" stroke="#1e293b" stroke-width="1"/>
  <text x="690" y="178" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">HTTP Proxy</text>
  <text x="690" y="202" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">Stream Proxy</text>
  <text x="690" y="226" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">xDS Client</text>
  <text x="690" y="250" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">Wasm Runtime</text>
  <text x="690" y="274" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="JetBrains Mono,monospace">Admin API</text>

  <!-- Bottom labels -->
  <text x="120" y="320" text-anchor="middle" fill="#64748b" font-size="11" font-family="Inter,sans-serif">Source of Truth</text>
  <text x="400" y="320" text-anchor="middle" fill="#64748b" font-size="11" font-family="Inter,sans-serif">Translation &amp; Distribution</text>
  <text x="690" y="320" text-anchor="middle" fill="#64748b" font-size="11" font-family="Inter,sans-serif">Traffic Processing</text>
</svg>