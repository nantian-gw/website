name: Question
description: Ask about the website, documentation, or project.
title: "[Question] "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Write in English or Chinese.

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - website content
        - documentation
        - translation / i18n
        - other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      placeholder: Explain what you are trying to do and what you already tried.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
