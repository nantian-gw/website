name: Feature Request
description: Suggest a new page, section, or improvement for the website.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Write in English or Chinese.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - landing page
        - docs content
        - i18n / translation
        - release / CI
        - other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      placeholder: What is missing or could be improved.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      placeholder: Describe the new content or feature.
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked the existing issues for similar requests.
          required: true
